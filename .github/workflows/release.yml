name: Build Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Artifact version label, for example v1.0.3"
        required: true
        default: "manual"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y

      - name: Build release artifacts
        shell: pwsh
        run: .\scripts\build_release.ps1 -Version "${{ github.event.inputs.version }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: StankyTools-Windows
          path: |
            release_artifacts/*.zip
            release_artifacts/*.exe

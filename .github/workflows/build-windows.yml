name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis --yes --no-progress

          $possiblePaths = @(
            "C:\Program Files (x86)\NSIS\makensis.exe",
            "C:\Program Files\NSIS\makensis.exe"
          )

          $makeNsis = $possiblePaths |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1

          if (-not $makeNsis) {
            throw "NSIS makensis.exe was not found after installation."
          }

          $nsisDirectory = Split-Path $makeNsis
          $nsisDirectory | Out-File `
            -FilePath $env:GITHUB_PATH `
            -Encoding utf8 `
            -Append

          & $makeNsis /VERSION

      - name: Build Windows release
        shell: powershell
        run: |
          .\scripts\build_release.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: StankyTools-Installer
          path: |
            dist/*Setup*.exe
            dist/*Installer*.exe
          if-no-files-found: warn

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: StankyTools-Portable
          path: dist/*.zip
          if-no-files-found: warn

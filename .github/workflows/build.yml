name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis --yes --no-progress

          $nsisPath = "C:\Program Files (x86)\NSIS"

          if (-not (Test-Path "$nsisPath\makensis.exe")) {
              $nsisPath = "C:\Program Files\NSIS"
          }

          if (-not (Test-Path "$nsisPath\makensis.exe")) {
              throw "NSIS installation failed."
          }

          echo "$nsisPath" | Out-File `
            -FilePath $env:GITHUB_PATH `
            -Encoding utf8 `
            -Append

          & "$nsisPath\makensis.exe" /VERSION

      - name: Build Release
        shell: powershell
        run: |
          .\scripts\build_release.ps1

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: StankyTools-Installer
          path: dist/*.exe

      - name: Upload Portable
        uses: actions/upload-artifact@v4
        with:
          name: StankyTools-Portable
          path: dist/*.zip
